<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Hastane Sistemi - Giriş</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e9ecef; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo { width: 80px; height: 80px; background-color: #0056b3; color: white; border-radius: 50%; display: inline-flex; justify-content: center; align-items: center; font-size: 36px; margin-bottom: 20px; }
        h2 { color: #333; margin-top: 0; margin-bottom: 30px; font-weight: 600; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 5px; box-sizing: border-box; font-size: 15px; }
        input:focus { border-color: #80bdff; outline: none; box-shadow: 0 0 0 0.2rem rgba(0,123,255,.25); }
        .btn-login { background-color: #0056b3; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        .btn-login:hover { background-color: #004494; }
        .error-msg { color: #dc3545; background-color: #f8d7da; padding: 10px; border-radius: 5px; margin-bottom: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo">🏥</div>
    <h2>Doktor Girişi</h2>
    
    {% if form.errors %}
        <div class="error-msg">
            Kullanıcı adı veya şifre hatalı. Lütfen tekrar deneyin.
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username">Kullanıcı Adı</label>
            {{ form.username }}
        </div>
        <div class="form-group">
            <label for="id_password">Parola</label>
            {{ form.password }}
        </div>
        <button type="submit" class="btn-login">Sisteme Giriş Yap</button>
    </form>
</div>

</body>
</html>
