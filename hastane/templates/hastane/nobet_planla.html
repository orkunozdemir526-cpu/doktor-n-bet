<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Planlayıcı</title>
</head>
<body style="font-family:sans-serif; background:#f4f7f6; display:flex; justify-content:center; padding-top:50px;">
    <div style="background:white; padding:30px; border-radius:8px; width:400px; box-shadow:0 4px 6px rgba(0,0,0,0.1);">
        <h2 style="color:#6f42c1; margin-top: 0; text-align: center;">🪄 Otomatik Planlayıcı</h2>
        <p style="text-align: center; color: #666; font-size: 14px; margin-bottom: 20px;">Planlama bittiğinde Excel dosyası otomatik iner.</p>
        
        {% if error %}<p style="color:white; background: #dc3545; padding: 10px; border-radius: 4px; text-align: center;">{{ error }}</p>{% endif %}
        
        <form method="POST">
            {% csrf_token %}
            <label style="font-weight: bold; color: #333;">Poliklinik Seçin</label><br>
            <select name="poliklinik_id" style="width:100%; padding:10px; margin:8px 0 15px 0; border: 1px solid #ccc; border-radius: 4px;" required>
                <option value="">-- Poliklinik Seçin --</option>
                {% for poli in poliklinikler %}
                    <option value="{{ poli.id }}">{{ poli.isim }}</option>
                {% endfor %}
            </select><br>
            
            <label style="font-weight: bold; color: #333;">Başlangıç Tarihi</label>
            <input type="date" name="baslangic_tarihi" required style="width:100%; padding:10px; margin:8px 0 15px 0; border: 1px solid #ccc; border-radius: 4px;"><br>
            
            <label style="font-weight: bold; color: #333;">Bitiş Tarihi</label>
            <input type="date" name="bitis_tarihi" required style="width:100%; padding:10px; margin:8px 0 15px 0; border: 1px solid #ccc; border-radius: 4px;"><br>
            
            <button type="submit" style="width:100%; background:#6f42c1; color:white; padding:12px; border:none; border-radius:4px; cursor:pointer; font-weight: bold; font-size: 15px; margin-top: 10px;">Planla ve Excel İndir 📊</button>
        </form>
        <a href="/admin/hastane/nobet/" style="display:block; text-align:center; margin-top:20px; color:#666; text-decoration: none;">← Panele Dön</a>
    </div>
</body>
</html>
